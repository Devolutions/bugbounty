services:
  sqlserver_db:
    image: docker.cloudsmith.io/devolutions/bug-bounty/bb-dvls-sql-linux:latest
    tty: true
    expose:
      - 1455
      - 1456
    ports:
      - 1455:1433
      - 1456:1434
    networks:
      internal:
        ipv4_address: 172.30.0.44
    environment:
      SQL_MSSQL_USER: ${SQL_MSSQL_USER}
      SQL_MSSQL_PASSWORD: ${SQL_MSSQL_PASSWORD}
      SQL_DVLS_USER: ${SQL_DVLS_USER}
      SQL_DVLS_PASSWORD: ${SQL_DVLS_PASSWORD}
      SQL_WHITELISTED_ORIGINS: ${SQL_WHITELISTED_ORIGINS}
      PROVISIONER_PUBLIC_KEY_B64: ${GTW_PROVISIONER_PUBLIC_KEY_B64}
      PROVISIONER_PRIVATE_KEY_B64: ${GTW_PROVISIONER_PRIVATE_KEY_B64}
      DVLS_DECRYPTED_ENCRYPTION_CONFIG_B64: ${DVLS_DECRYPTED_ENCRYPTION_CONFIG_B64}
    volumes:
      - ./data-sql:/var/opt/mssql/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:42424"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
      
  dvls_server:
    image: docker.cloudsmith.io/devolutions/bug-bounty/bb-dvls-server-linux:latest
    user: root
    depends_on:
      sqlserver_db:
        condition: service_healthy
    networks:
      internal:
        ipv4_address: 172.30.0.45
    ports:
      - 5544:443
      - 5580:80
    environment:
        DVLS_CONNECTION_STRING: ${DVLS_CONNECTION_STRING}
        DVLS_CERT_CONFIG: ${DVLS_CERT_CONFIG}
        DVLS_CERT_CRT_B64: ${DVLS_CERT_CRT_B64}
        DVLS_CERT_KEY_B64: ${DVLS_CERT_KEY_B64}
        DVLS_CA_CERT_B64: ${DVLS_CA_CERT_B64}
        DVLS_DECRYPTED_ENCRYPTION_CONFIG_B64: ${DVLS_DECRYPTED_ENCRYPTION_CONFIG_B64}
        SQL_DVLS_USER: ${SQL_DVLS_USER}
        SQL_DVLS_PASSWORD: ${SQL_DVLS_PASSWORD}
        SCHEDULER_EMBEDDED: "true"

    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  ssh_gateway_required:
    image: alpine:latest
    container_name: alpine-ssh
    volumes:
      - ./alpine-ssh/startup.sh:/startup.sh:ro
    command: ["/startup.sh"]
    networks:
      external:
        ipv4_address: 172.31.0.10
    restart: unless-stopped

  devolutions-gateway:
    image: devolutions/devolutions-gateway:latest
    container_name: devolutions-gateway
    expose:
      - 7771
      - 8881
    ports:
      - "7771:7771"
      - "8881:8881"
    networks:
      internal:
        ipv4_address: 172.30.0.50
        aliases:
            - gateway.loc
      external:
        ipv4_address: 172.31.0.50        
        aliases:
            - gateway.loc
    environment:
      HOSTNAME: ${GTW_HOSTNAME}
      WEB_SCHEME: https
      WEB_APP_ENABLED: "true"
      TCP_ENABLED: "true"
      TCP_PORT: 8881
      WEB_PORT: 7771
      PROVISIONER_PUBLIC_KEY_B64: ${GTW_PROVISIONER_PUBLIC_KEY_B64}
      PROVISIONER_PRIVATE_KEY_B64: ${GTW_PROVISIONER_PRIVATE_KEY_B64}
      TLS_CERTIFICATE_B64: ${GTW_TLS_CERTIFICATE_B64}
      TLS_PRIVATE_KEY_B64: ${GTW_TLS_PRIVATE_KEY_B64}
    restart: unless-stopped

  samba-ad-dc:
    image: diegogslomp/samba-ad-dc:latest
    container_name: samba-ad-dc
    hostname: dc1.ad.lab
    domainname: ad.lab
    privileged: true
    restart: unless-stopped
    expose:
      - 636
    ports:
      - 1636:636
    networks:
      internal:
        ipv4_address: 172.30.0.90
        aliases:
          - dc1.ad.lab
    environment:
      REALM: AD.LAB
      DOMAIN: AD
      DNS_FORWARDER: 1.1.1.1
      ADMIN_PASS: "MotDePasseFort2026"
    volumes:
      - ./dc1.ad.lab/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]

networks:
  internal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
  external:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.0.0/24